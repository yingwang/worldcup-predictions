<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 世界杯淘汰赛量化预测</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --accent: #3fb950;
    --accent2: #58a6ff; --gold: #d29922; --bad: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    line-height: 1.6; padding: 24px 16px 64px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  h2 { font-size: 1.15rem; margin: 36px 0 12px; color: var(--accent2); }
  .sub { color: var(--dim); font-size: .85rem; margin-bottom: 8px; }
  .lang-toggle { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
  .lang-toggle button {
    background: #21262d; color: var(--text); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 10px; cursor: pointer; font-size: .8rem;
  }
  .lang-toggle button.active { border-color: var(--accent2); color: #fff; background: #1f6feb; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 10px;
  }
  /* 冠军概率条 */
  .champ-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
  .champ-name { width: clamp(5.5em, 28vw, 12em); text-align: right; font-size: .95rem; flex-shrink: 0; }
  .champ-bar-track { flex: 1; background: #21262d; border-radius: 4px; height: 20px; overflow: hidden; }
  .champ-bar { height: 100%; background: linear-gradient(90deg, #1f6feb, #3fb950); border-radius: 4px; }
  .champ-pct { width: 4.2em; font-variant-numeric: tabular-nums; font-size: .9rem; flex-shrink: 0; }
  /* 路径 */
  .round-title { font-weight: 600; color: var(--gold); margin: 18px 0 6px; font-size: 1rem; }
  .match {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 10px;
    padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: .95rem;
  }
  .match:last-child { border-bottom: none; }
  .match .meta { color: var(--dim); font-size: .8rem; width: 8.5em; flex-shrink: 0; }
  .match .teams { min-width: 13em; }
  .match .score { font-weight: 700; font-variant-numeric: tabular-nums; }
  .match .win { color: var(--accent); }
  .match .prob { color: var(--dim); font-size: .82rem; }
  .team-flag { margin-right: 3px; }
  .match.played { opacity: .55; }
  .match.played .score { color: var(--text); }
  .pred-line { width: 100%; margin-left: calc(8.5em + 10px); color: var(--dim); font-size: .78rem; }
  .badge {
    display: inline-block; font-size: .7rem; padding: 0 6px; border-radius: 8px;
    border: 1px solid var(--border); color: var(--dim); vertical-align: 1px;
  }
  .metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
  .metric {
    background: #0d1117; border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
  }
  .metric-label { color: var(--dim); font-size: .78rem; }
  .metric-value { font-size: 1.25rem; font-weight: 700; margin-top: 2px; }
  .ok { color: var(--accent); }
  .miss { color: var(--bad); }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border);
           font-variant-numeric: tabular-nums; }
  th { color: var(--dim); font-weight: 500; font-size: .8rem; }
  td.num, th.num { text-align: right; }
  .fine { color: var(--dim); font-size: .82rem; }
  .method p { margin: 8px 0; font-size: .9rem; color: #c9d1d9; }
  a { color: var(--accent2); text-decoration: none; }
  .disclaimer {
    margin-top: 28px; padding: 12px 16px; border: 1px dashed var(--border);
    border-radius: 10px; color: var(--dim); font-size: .82rem;
  }
  @media (max-width: 560px) {
    .topbar { display: block; }
    .lang-toggle { margin: 10px 0 0; }
    .match .meta { width: 100%; }
    .pred-line { margin-left: 0; }
    .metric-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1 id="title">2026 世界杯淘汰赛量化预测</h1>
      <div class="sub" id="subline"></div>
    </div>
    <div class="lang-toggle" aria-label="Language">
      <button id="lang-zh" type="button">中文 🇨🇳</button>
      <button id="lang-en" type="button">English 🇬🇧</button>
    </div>
  </div>

  <h2 id="champ-title">夺冠概率</h2>
  <div class="card" id="champ"></div>

  <h2 id="path-title">推演:90 分钟最可能比分与晋级方</h2>
  <div class="sub" id="path-sub">已赛场次为真实结果(灰显);未赛场次取模型 90 分钟最可能比分与晋级方,逐轮推进。</div>
  <div class="card" id="path"></div>

  <h2 id="accuracy-title">预测准确率</h2>
  <div class="sub" id="accuracy-sub">只统计赛前已经保存过预测快照、后来又完赛的场次。</div>
  <div class="card" id="accuracy"></div>

  <h2 id="detail-title">剩余场次逐场概率</h2>
  <div class="card" style="overflow-x:auto"><table id="detail"></table></div>

  <h2 id="pairs-title">最可能的决赛组合</h2>
  <div class="card"><table id="pairs"></table></div>

  <h2 id="method-title">方法</h2>
  <div class="card method" id="method"></div>

  <div class="disclaimer" id="disclaimer">
    本页由模型自动生成,仅供娱乐与方法演示。预测不构成任何形式的保证,
    也不建议据此参与任何博彩活动。足球是圆的,这正是它好看的原因。
  </div>
</div>

<script src="data.js"></script>
<script>
const T = code => DATA.teams[code];
const pct = (p, d=1) => (p*100).toFixed(d) + "%";
const texts = {
  zh: {
    title: "2026 世界杯淘汰赛量化预测",
    pageTitle: "2026 世界杯淘汰赛量化预测",
    subline: () => `数据截至 ${DATA.dataDate} · Elo 来源 eloratings.net · Monte Carlo ${DATA.nSims.toLocaleString()} 次 · 每日自动更新`,
    champTitle: "夺冠概率",
    pathTitle: "推演:90 分钟最可能比分与晋级方",
    pathSub: "已赛场次显示真实结果;如果赛前已经保存过预测,会同时显示当时的预测比分和晋级方。未赛场次取模型 90 分钟最可能比分与晋级方,逐轮推进。",
    accuracyTitle: "预测准确率",
    accuracySub: "只统计赛前已经保存过预测快照、后来又完赛的场次。预测比分是 90 分钟含补时比分;实际 90 分钟比分优先用 ESPN linescores 补充。",
    detailTitle: "剩余场次逐场概率",
    pairsTitle: "最可能的决赛组合",
    methodTitle: "方法",
    played: "已赛",
    predicted: "赛前预测",
    actual: "实际结果",
    advance: "晋级",
    scoreProb: "90 分钟该比分概率",
    evaluated: "已评估场次",
    winnerAccuracy: "晋级方命中率",
    scoreAccuracy: "90 分钟比分命中率",
    finalScore: "最终",
    score90: "90分钟",
    scoreET: "加时后",
    penalties: "点球",
    notEvaluated: "不计",
    hit: "命中",
    miss: "未中",
    noAccuracy: "还没有可评估的赛前预测快照。后续比赛会自动保存预测,赛后再计算命中率。",
    rounds: {R32:"32 强", R16:"16 强", QF:"八强", SF:"半决赛", TP:"季军赛", F:"决赛"},
    table: {
      round: "轮次",
      matchup: "对阵 (Elo 含主场分)",
      prediction: "赛前预测",
      actual: "实际结果",
      winnerHit: "晋级方",
      scoreHit: "比分",
      wdl: "90 分钟胜/平/负",
      adv: "晋级概率",
      scores: "90 分钟最可能比分 (前三)",
      pair: "组合",
      probability: "概率",
    },
    note(note) {
      if (!note) return "";
      return note;
    },
    method: () => `
      <p><b>输入。</b>模型只有两类输入:各队在 eloratings.net 的 World Football Elo Ratings,
      以及截至数据日期的真实赛果与对阵表。不使用任何媒体预测、伤停消息或人工调整。</p>
      <p><b>单场模型。</b>由 Elo 差 d 得胜负期望 We = 1/(1+10<sup>−d/400</sup>),
      在本国境内比赛的球队加 ${DATA.params.homeBonus} Elo 主场分。固定 90 分钟两队合计进球期望为
      ${DATA.params.totalGoals},用二分法解出双方进球率 λ₁、λ₂,使双泊松比分分布给出的期望积分
      恰好等于 We。比分分布因此与 Elo 完全自洽,没有额外的自由参数。</p>
      <p><b>淘汰赛推进。</b>90 分钟战平进入加时(进球率取常规时间的三分之一),
      仍平则点球按五五开处理。从当前真实对阵出发,对剩余赛程做 ${DATA.nSims.toLocaleString()}
      次 Monte Carlo 模拟,统计各队晋级与夺冠概率;单场比分分布为解析计算。</p>
      <p><b>更新。</b>GitHub Actions 每日抓取最新赛果与 Elo,有新比赛完赛才会重算并发布,
      代码见 <a href="https://github.com/yingwang/worldcup-predictions">仓库</a>。</p>
      <p><b>已知局限。</b>模型不含阵容、伤停、红牌停赛与天气;点球五五开是有意的保守选择;
      主场分只按国境判断,不衡量实际球迷构成。这些都是噪声来源,也是足球的一部分。</p>`,
    disclaimer: "本页由模型自动生成,仅供娱乐与方法演示。预测不构成任何形式的保证,也不建议据此参与任何博彩活动。足球是圆的,这正是它好看的原因。",
  },
  en: {
    title: "2026 World Cup Knockout Predictions",
    pageTitle: "2026 World Cup Knockout Predictions",
    subline: () => `Data as of ${DATA.dataDate} · Elo from eloratings.net · ${DATA.nSims.toLocaleString()} Monte Carlo simulations · daily auto-update`,
    champTitle: "Title probabilities",
    pathTitle: "Projection: most likely 90-minute score and advancer",
    pathSub: "Played matches show real results. If a pre-match snapshot was saved, the original predicted score and advancer are shown as well. Future matches use the model's most likely 90-minute score and advancer.",
    accuracyTitle: "Prediction accuracy",
    accuracySub: "Only matches with a saved pre-match prediction snapshot are evaluated. Predicted scores are 90-minute scores including stoppage time; actual 90-minute scores are enriched from ESPN linescores when available.",
    detailTitle: "Match-by-match probabilities",
    pairsTitle: "Most likely final pairings",
    methodTitle: "Method",
    played: "played",
    predicted: "pre-match",
    actual: "actual",
    advance: "advance",
    scoreProb: "90-minute score probability",
    evaluated: "Evaluated matches",
    winnerAccuracy: "Advancer accuracy",
    scoreAccuracy: "90-min score accuracy",
    finalScore: "Final",
    score90: "90 min",
    scoreET: "After ET",
    penalties: "Pens",
    notEvaluated: "n/a",
    hit: "hit",
    miss: "miss",
    noAccuracy: "No evaluable pre-match prediction snapshots yet. Future matches will be archived before kickoff and evaluated after results arrive.",
    rounds: {R32:"Round of 32", R16:"Round of 16", QF:"Quarterfinals", SF:"Semifinals", TP:"Third-place match", F:"Final"},
    table: {
      round: "Round",
      matchup: "Matchup (Elo incl. home bonus)",
      prediction: "Pre-match prediction",
      actual: "Actual result",
      winnerHit: "Advancer",
      scoreHit: "Score",
      wdl: "90-min W/D/L",
      adv: "Advance probability",
      scores: "Most likely 90-min scores (top 3)",
      pair: "Pairing",
      probability: "Probability",
    },
    note(note) {
      if (!note) return "";
      if (note === "加时") return "AET";
      if (note === "加时/点球") return "AET/pens";
      if (note.startsWith("点球 ")) return `pens ${note.slice(3)}`;
      return note;
    },
    method: () => `
      <p><b>Inputs.</b>The model uses only two inputs: each team's World Football Elo Rating
      from eloratings.net, and the real results plus bracket state as of the data date. It uses no
      media forecasts, injury news, lineup assumptions, or manual adjustments.</p>
      <p><b>Single-match model.</b>An Elo difference d gives win expectancy
      We = 1/(1+10<sup>−d/400</sup>). A team playing inside its own country receives a
      ${DATA.params.homeBonus}-point Elo home bonus. The model fixes total expected 90-minute goals at
      ${DATA.params.totalGoals}, then solves λ₁ and λ₂ by bisection so the double-Poisson score grid has
      the same expected result as Elo. The score distribution is therefore tied directly to Elo and has
      no extra fitted strength parameter.</p>
      <p><b>Knockout progression.</b>A 90-minute draw goes to extra time, with extra-time scoring rates set
      to one third of normal time. If still level, penalties are treated as 50/50. Starting from the
      current real bracket, the site runs ${DATA.nSims.toLocaleString()} Monte Carlo simulations of the
      remaining tournament and reports advancement and title probabilities. Individual score grids are
      computed analytically, not sampled.</p>
      <p><b>Updates.</b>GitHub Actions fetches new results and Elo ratings daily. When completed matches
      change the state, predictions are rebuilt and published. Code:
      <a href="https://github.com/yingwang/worldcup-predictions">repository</a>.</p>
      <p><b>Known limits.</b>The model does not include squads, injuries, suspensions, weather, or tactical
      matchups. Penalties are deliberately conservative at 50/50. Home bonus is based only on host country,
      not actual crowd composition.</p>`,
    disclaimer: "This page is generated by an automated model for entertainment and method demonstration only. It is not a guarantee and should not be used for betting. Football remains uncertain; that is part of the point.",
  }
};

const savedLang = localStorage.getItem("lang");
let lang = (savedLang === "zh" || savedLang === "en")
  ? savedLang
  : ((navigator.language || "").toLowerCase().startsWith("en") ? "en" : "zh");

function teamName(code) {
  const t = T(code);
  const name = lang === "en" ? t.en : t.zh;
  return `<span class="team-flag">${t.flag || ""}</span>${name}`;
}

function matchNote(note) {
  return note ? ` <span class="badge">${texts[lang].note(note)}</span>` : "";
}

function predictionText(pred) {
  const tx = texts[lang];
  return `${tx.predicted}: ${teamName(pred.a)} <b>${pred.score}</b> ${teamName(pred.b)}${matchNote(pred.note)}
    · ${teamName(pred.winner)} ${tx.advance} ${pct(pred.pAdvance,0)}`;
}

function actualBreakdown(actual) {
  const tx = texts[lang];
  const parts = [];
  if (actual.score90) parts.push(`${tx.score90} <b>${actual.score90}</b>`);
  if (actual.scoreET && actual.scoreET !== actual.score90) parts.push(`${tx.scoreET} ${actual.scoreET}`);
  if (actual.penaltyScore) parts.push(`${tx.penalties} ${actual.penaltyScore}`);
  parts.push(`${tx.finalScore} ${actual.score}${matchNote(actual.note)}`);
  return parts.join(" · ");
}

function renderChamp() {
  const el = document.getElementById("champ");
  const rows = DATA.champTable.filter(r => r.pC >= 0.001).slice(0, 14);
  const max = rows[0].pC;
  el.innerHTML = rows.map(r => `
    <div class="champ-row">
      <div class="champ-name">${teamName(r.code)}</div>
      <div class="champ-bar-track"><div class="champ-bar" style="width:${(r.pC/max*100).toFixed(1)}%"></div></div>
      <div class="champ-pct">${pct(r.pC)}</div>
    </div>`).join("");
}

function renderPath() {
  const tx = texts[lang];
  const el = document.getElementById("path");
  const order = ["R32", "R16", "QF", "SF", "TP", "F"];
  let html = "";
  for (const rd of order) {
    const ms = DATA.modalPath.filter(m => m.round === rd);
    if (!ms.length) continue;
    html += `<div class="round-title">${tx.rounds[rd]}</div>`;
    for (const m of ms) {
      const wA = m.winner === m.a;
      html += `<div class="match${m.played ? " played" : ""}">
        <span class="meta">${m.date} · ${m.city}</span>
        <span class="teams">
          <span class="${wA ? "win" : ""}">${teamName(m.a)}</span>
          <span class="score"> ${m.score} </span>
          <span class="${!wA ? "win" : ""}">${teamName(m.b)}</span>
          ${matchNote(m.note)}
        </span>
        ${m.played
          ? `<span class="prob">${tx.played}</span>`
          : `<span class="prob">${teamName(m.winner)} ${tx.advance} ${pct(m.pAdvance,0)} · ${tx.scoreProb} ${pct(m.scoreP)}</span>`}
        ${m.played && m.score90 ? `<span class="pred-line">${actualBreakdown(m)}</span>` : ""}
        ${m.played && m.prediction ? `<span class="pred-line">${predictionText(m.prediction)}</span>` : ""}
      </div>`;
    }
  }
  el.innerHTML = html;
}

function renderAccuracy() {
  const tx = texts[lang];
  const el = document.getElementById("accuracy");
  const acc = DATA.accuracy || {total: 0, rows: []};
  if (!acc.total) {
    el.innerHTML = `<div class="fine">${tx.noAccuracy}</div>`;
    return;
  }
  el.innerHTML = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">${tx.evaluated}</div><div class="metric-value">${acc.total}</div></div>
      <div class="metric"><div class="metric-label">${tx.winnerAccuracy}</div><div class="metric-value">${pct(acc.winnerRate)}</div><div class="fine">${acc.winnerCorrect}/${acc.total}</div></div>
      <div class="metric"><div class="metric-label">${tx.scoreAccuracy}</div><div class="metric-value">${acc.scoreRate === null ? "—" : pct(acc.scoreRate)}</div><div class="fine">${acc.scoreCorrect}/${acc.scoreEvaluated}</div></div>
    </div>
    <div style="overflow-x:auto"><table>
      <tr>
        <th>${tx.table.round}</th>
        <th>${tx.table.matchup}</th>
        <th>${tx.table.prediction}</th>
        <th>${tx.table.actual}</th>
        <th class="num">${tx.table.winnerHit}</th>
        <th class="num">${tx.table.scoreHit}</th>
      </tr>
      ${acc.rows.map(r => `
        <tr>
          <td>${tx.rounds[r.round]}<div class="fine">${r.date} · ${r.city}</div></td>
          <td>${teamName(r.a)} vs ${teamName(r.b)}</td>
          <td>${teamName(r.prediction.winner)} · ${r.prediction.score}${matchNote(r.prediction.note)}</td>
          <td>${teamName(r.actual.winner)} · ${actualBreakdown(r.actual)}</td>
          <td class="num ${r.winnerCorrect ? "ok" : "miss"}">${r.winnerCorrect ? tx.hit : tx.miss}</td>
          <td class="num ${!r.scoreEvaluated ? "" : r.scoreCorrect ? "ok" : "miss"}">${!r.scoreEvaluated ? tx.notEvaluated : r.scoreCorrect ? tx.hit : tx.miss}</td>
        </tr>`).join("")}
    </table></div>`;
}

function renderDetail() {
  const tx = texts[lang];
  const el = document.getElementById("detail");
  const rows = DATA.modalPath.filter(m => !m.played);
  el.innerHTML = `<tr><th>${tx.table.round}</th><th>${tx.table.matchup}</th>
      <th class="num">${tx.table.wdl}</th><th class="num">${tx.table.adv}</th><th>${tx.table.scores}</th></tr>` +
    rows.map(m => `<tr>
      <td>${tx.rounds[m.round]}<div class="fine">${m.date}</div></td>
      <td>${teamName(m.a)} (${m.eloA}) vs ${teamName(m.b)} (${m.eloB})</td>
      <td class="num">${pct(m.pWin90,0)} / ${pct(m.pDraw90,0)} / ${pct(m.pLoss90,0)}</td>
      <td class="num"><b>${teamName(m.winner)} ${pct(m.pAdvance)}</b></td>
      <td>${m.topScores.slice(0,3).map(s => `${s.s} (${pct(s.p)})`).join(lang === "en" ? ", " : "、")}</td>
    </tr>`).join("");
}

function renderPairs() {
  const tx = texts[lang];
  const el = document.getElementById("pairs");
  el.innerHTML = `<tr><th>${tx.table.pair}</th><th class="num">${tx.table.probability}</th></tr>` +
    DATA.finalPairs.map(r =>
      `<tr><td>${teamName(r.pair[0])} vs ${teamName(r.pair[1])}</td><td class="num">${pct(r.p)}</td></tr>`).join("");
}

function setLang(next) {
  lang = next;
  localStorage.setItem("lang", lang);
  render();
}

function render() {
  const tx = texts[lang];
  document.documentElement.lang = lang === "en" ? "en" : "zh-CN";
  document.title = tx.pageTitle;
  document.getElementById("title").textContent = tx.title;
  document.getElementById("subline").textContent = tx.subline();
  document.getElementById("champ-title").textContent = tx.champTitle;
  document.getElementById("path-title").textContent = tx.pathTitle;
  document.getElementById("path-sub").textContent = tx.pathSub;
  document.getElementById("accuracy-title").textContent = tx.accuracyTitle;
  document.getElementById("accuracy-sub").textContent = tx.accuracySub;
  document.getElementById("detail-title").textContent = tx.detailTitle;
  document.getElementById("pairs-title").textContent = tx.pairsTitle;
  document.getElementById("method-title").textContent = tx.methodTitle;
  document.getElementById("method").innerHTML = tx.method();
  document.getElementById("disclaimer").textContent = tx.disclaimer;
  document.getElementById("lang-zh").classList.toggle("active", lang === "zh");
  document.getElementById("lang-en").classList.toggle("active", lang === "en");
  renderChamp();
  renderPath();
  renderAccuracy();
  renderDetail();
  renderPairs();
}

document.getElementById("lang-zh").addEventListener("click", () => setLang("zh"));
document.getElementById("lang-en").addEventListener("click", () => setLang("en"));
render();
</script>
</body>
</html>
